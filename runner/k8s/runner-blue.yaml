### BLUE DEPLOY ###
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: pingmapper-runner
  name: pingmapper-runner
  namespace: pixelrag
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: pingmapper-runner
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: pingmapper-runner
    spec:
      containers:
      - image: pingmapper-runner:tf
        imagePullPolicy: Never
        name: runner
        ports:
        - containerPort: 8000
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /health
            port: 8000
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /app/server.py
          name: server-code
          subPath: server.py
        - mountPath: /home/mambauser/.pingmapper
          name: model-cache
        - mountPath: /data
          name: data
        - mountPath: /data/input
          name: input
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
      - configMap:
          defaultMode: 420
          name: pingmapper-server
        name: server-code
      - hostPath:
          path: /home/vforce/pingmapper-cache
          type: DirectoryOrCreate
        name: model-cache
      - emptyDir:
          sizeLimit: 4Gi
        name: data
      - hostPath:
          path: /home/vforce/pingmapper-input
          type: DirectoryOrCreate
        name: input

### SERVICE ###
apiVersion: v1
kind: Service
metadata:
  name: pingmapper-runner
  namespace: pixelrag
spec:
  externalTrafficPolicy: Cluster
  internalTrafficPolicy: Cluster
  ipFamilies:
  - IPv4
  ipFamilyPolicy: SingleStack
  ports:
  - nodePort: 30820
    port: 80
    protocol: TCP
    targetPort: 8000
  selector:
    app: pingmapper-runner-gpu
  sessionAffinity: None
  type: NodePort

